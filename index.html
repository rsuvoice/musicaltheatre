<!DOCTYPE html>
<html lang="th">
<head>

    <title>Audition: เมืองนิมิตร Musical Theatre</title>
    <style>
        body {
            margin: 0;

            background-color: #f4eee0; /* สีครีมกระดาษเก่า */
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 50px 20px;

            border-radius: 50px;

            transition: transform 0.3s;

        .btn-apply:hover { transform: scale(1.05); }

<body>
    <div class="container">
        <img src="S__16465933_0.jpg" alt="เมืองนิมิตร Poster" class="poster">

        <a href="LINK_TO_YOUR_FORM" class="btn-apply">สมัครออนไลน์ที่นี่</a>
